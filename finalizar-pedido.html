<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FEF08A">
  <link rel="icon" type="image/jpeg" href="img/logoteste.jpeg">
  <meta name="description" content="Finalizar pedido - Flabelli Confeitaria">
  <title>Finalizar pedido | Flabelli Confeitaria</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="finalizar-pedido.css">
</head>
<body>

  <header class="fp-topo">
    <a class="fp-voltar" href="cardapio.html" aria-label="Voltar ao cardápio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </a>
    <div class="fp-logo">
      <img src="img/logoteste.jpeg" alt="Flabelli Confeitaria">
    </div>
    <div class="fp-topo-placeholder"></div>
  </header>

  <main class="fp-main">

    <div class="fp-saudacao">
      <span class="fp-saudacao-icone">👋</span>
      <div>
        <h1 class="fp-titulo">Finalizar pedido</h1>
        <p class="fp-subtitulo">Olá! Gostaria de realizar um pedido 😊</p>
      </div>
    </div>

    <!-- RESUMO DO PEDIDO -->
    <section class="fp-card">
      <h2 class="fp-card-titulo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Resumo do pedido
      </h2>
      <div class="fp-itens" id="fpItens">
        <!-- preenchido por JS -->
      </div>
      <div class="fp-total-linha">
        <span class="fp-total-label">Valor total</span>
        <span class="fp-total-val" id="fpTotal">R$ 0,00</span>
      </div>
    </section>

    <!-- FORMA DE PAGAMENTO -->
    <section class="fp-card">
      <h2 class="fp-card-titulo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/></svg>
        Forma de pagamento
      </h2>
      <div class="fp-pagamentos">
        <label class="fp-pag-opcao">
          <input type="radio" name="pagamento" value="Pix" checked>
          <span class="fp-pag-card">
            <span class="fp-pag-icone">⚡</span>
            <span class="fp-pag-nome">Pix</span>
          </span>
        </label>
        <label class="fp-pag-opcao">
          <input type="radio" name="pagamento" value="Cartão de crédito (link de pagamento)">
          <span class="fp-pag-card">
            <span class="fp-pag-icone">💳</span>
            <span class="fp-pag-nome">Crédito</span>
            <span class="fp-pag-detalhe">link de pagamento</span>
          </span>
        </label>
        <label class="fp-pag-opcao">
          <input type="radio" name="pagamento" value="Cartão de débito (link de pagamento)">
          <span class="fp-pag-card">
            <span class="fp-pag-icone">🏧</span>
            <span class="fp-pag-nome">Débito</span>
            <span class="fp-pag-detalhe">link de pagamento</span>
          </span>
        </label>
      </div>
    </section>

    <!-- DADOS DO CLIENTE -->
    <section class="fp-card">
      <h2 class="fp-card-titulo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Seus dados
      </h2>
      <form class="fp-form" id="fpForm" novalidate>
        <div class="fp-campo">
          <label class="fp-label" for="fpNome">Nome</label>
          <input class="fp-input" type="text" id="fpNome" placeholder="Seu nome completo" autocomplete="name" required>
        </div>
        <div class="fp-campo">
          <label class="fp-label" for="fpTelefone">Telefone</label>
          <input class="fp-input" type="tel" id="fpTelefone" placeholder="(00) 00000-0000" autocomplete="tel" required>
        </div>
        <div class="fp-campo">
          <label class="fp-label" for="fpEndereco">Endereço <span class="fp-label-opcional">(opcional)</span></label>
          <input class="fp-input" type="text" id="fpEndereco" placeholder="Rua e número" autocomplete="address-line1">
        </div>
        <div class="fp-campo-linha">
          <div class="fp-campo">
            <label class="fp-label" for="fpBairro">Bairro <span class="fp-label-opcional">(opcional)</span></label>
            <input class="fp-input" type="text" id="fpBairro" placeholder="Seu bairro" autocomplete="address-level3">
          </div>
          <div class="fp-campo">
            <label class="fp-label" for="fpComplemento">Complemento <span class="fp-label-opcional">(opcional)</span></label>
            <input class="fp-input" type="text" id="fpComplemento" placeholder="Apto, bloco, referência..." autocomplete="address-line2">
          </div>
        </div>
        <p class="fp-erro" id="fpErro" hidden></p>
      </form>
    </section>

  </main>

  <footer class="fp-rodape">
    <p class="fp-aviso-frete">O valor do frete será informado após a confirmação do seu pedido pelo WhatsApp. 😊</p>
    <button type="button" class="fp-btn-enviar" id="fpBtnEnviar">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20" style="flex-shrink:0">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.557 4.118 1.529 5.845L.057 23.571a.5.5 0 0 0 .612.612l5.763-1.478A11.944 11.944 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.693-.528-5.218-1.445l-.374-.223-3.878.994.999-3.795-.245-.389A9.956 9.956 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
      </svg>
      Enviar pedido pelo WhatsApp
    </button>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="finalizar-pedido.js"></script>
</body>
</html>
